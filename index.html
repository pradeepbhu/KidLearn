<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⭐ KidLearn Magic!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#FF4757;--teal:#2ED573;--yellow:#FFD32A;--orange:#FF6B35;
  --purple:#A55EEA;--pink:#FF6B9D;--blue:#1E90FF;--bg:#FFFBF0;
  --dark:#2F3542;--mid:#747D8C;--white:#FFFFFF;
}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);-webkit-tap-highlight-color:transparent;}

/* ── ANIMATED BG STARS ── */
body::before{
  content:'⭐🌟✨💫⭐🌟✨💫';
  position:fixed;top:0;left:0;right:0;font-size:28px;
  opacity:0.06;letter-spacing:40px;line-height:60px;
  word-break:break-all;pointer-events:none;z-index:0;
  animation:bgScroll 20s linear infinite;
}
@keyframes bgScroll{from{transform:translateY(-60px);}to{transform:translateY(60px);}}

/* ── KEYFRAMES ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-12px) rotate(3deg);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes bounceIn{0%{transform:scale(0) rotate(-10deg);opacity:0;}70%{transform:scale(1.15) rotate(3deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-8deg);}75%{transform:rotate(8deg);}}
@keyframes starPop{0%{transform:scale(1);}30%{transform:scale(1.6);}60%{transform:scale(.9);}100%{transform:scale(1);}}
@keyframes confetti{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(60px) rotate(720deg);opacity:0;}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.4);}70%{box-shadow:0 0 0 12px rgba(255,71,87,0);}}
@keyframes rainbow{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}
@keyframes slideRight{from{transform:translateX(-30px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#FF4757 0%,#FF6B35 30%,#FFD32A 60%,#2ED573 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease;overflow:hidden;
}
#splash.fade{opacity:0;pointer-events:none;}
.splash-stars{position:absolute;font-size:36px;animation:spin 8s linear infinite;opacity:.3;}
.splash-stars:nth-child(2){top:10%;left:10%;animation-duration:6s;}
.splash-stars:nth-child(3){top:15%;right:15%;animation-duration:10s;animation-direction:reverse;}
.splash-stars:nth-child(4){bottom:20%;left:5%;animation-duration:7s;}
.splash-stars:nth-child(5){bottom:10%;right:8%;animation-duration:9s;}
.sl{
  font-family:'Fredoka One',cursive;
  font-size:clamp(44px,12vw,72px);color:#fff;
  text-shadow:4px 4px 0 rgba(0,0,0,.2),0 0 40px rgba(255,255,255,.5);
  animation:bounceIn .8s cubic-bezier(.36,1.56,.64,1) .2s both;
  position:relative;z-index:1;
}
.splash-sub{
  font-size:clamp(15px,4.5vw,22px);color:rgba(255,255,255,.95);
  margin-top:10px;font-weight:900;letter-spacing:1px;
  animation:bounceIn .6s ease .6s both;position:relative;z-index:1;
}
.splash-emoji{font-size:clamp(50px,14vw,80px);margin-top:16px;animation:float 2s ease-in-out infinite;position:relative;z-index:1;}
.splash-loading{
  margin-top:24px;display:flex;gap:8px;position:relative;z-index:1;
}
.splash-dot{
  width:12px;height:12px;border-radius:50%;background:#fff;
  animation:bounce-dot .8s ease infinite;
}
.splash-dot:nth-child(2){animation-delay:.15s;}
.splash-dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce-dot{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ── APP ── */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
#app.show{display:flex;}

/* ── TOPBAR ── */
.topbar{
  background:linear-gradient(135deg,#FF4757,#FF6B35);
  padding:12px 14px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 16px rgba(255,71,87,.35);position:sticky;top:0;z-index:100;
}
.ttl{
  font-family:'Fredoka One',cursive;font-size:clamp(16px,5vw,22px);
  color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.15);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%;
}
.score-box{
  background:#fff;border-radius:50px;padding:5px 14px;
  font-weight:900;font-size:clamp(13px,4vw,16px);color:#FF4757;
  display:flex;gap:5px;align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
}
.score-box .star-icon{animation:starPop .3s ease;}
.score-box.pop .star-icon{animation:starPop .4s ease;}

/* ── SCREENS ── */
.screen{padding:14px 13px 92px;display:none;flex-direction:column;gap:14px;}
.screen.active{display:flex;}

/* ── HOME BANNER ── */
.banner{
  background:linear-gradient(135deg,#A55EEA,#6C5CE7);
  border-radius:24px;padding:20px 18px 14px;color:#fff;
  position:relative;overflow:hidden;
  box-shadow:0 8px 24px rgba(165,94,234,.4);
}
.banner::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.banner::after{
  content:'';position:absolute;bottom:-20px;left:40px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.banner h2{font-family:'Fredoka One',cursive;font-size:clamp(20px,5.5vw,28px);text-shadow:2px 2px 0 rgba(0,0,0,.1);}
.banner p{font-size:clamp(12px,3.5vw,15px);opacity:.92;margin-top:5px;font-weight:700;}
.banner-stars{margin-top:10px;font-size:20px;letter-spacing:4px;opacity:.8;}
.mascot{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:clamp(52px,15vw,72px);animation:float 3s ease-in-out infinite;filter:drop-shadow(3px 3px 6px rgba(0,0,0,.2));}

/* ── PROGRESS ── */
.prog-section{background:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 3px 12px rgba(0,0,0,.07);}
.prog-label{font-family:'Fredoka One',cursive;font-size:clamp(12px,3.5vw,14px);color:var(--mid);margin-bottom:6px;display:flex;justify-content:space-between;}
.prog-label span{color:var(--orange);font-size:clamp(13px,3.8vw,15px);}
.prog-wrap{background:#f0f0f0;border-radius:20px;height:12px;overflow:hidden;position:relative;}
.prog-bar{
  height:100%;
  background:linear-gradient(90deg,#FF4757,#FFD32A,#2ED573);
  background-size:200% 100%;
  border-radius:20px;transition:width .6s cubic-bezier(.34,1.56,.64,1);
  animation:rainbow 3s linear infinite;
}
.prog-wrap::after{content:'🚀';position:absolute;top:-4px;font-size:20px;transition:left .6s cubic-bezier(.34,1.56,.64,1);}

/* ── SEC TITLE ── */
.sec-ttl{
  font-family:'Fredoka One',cursive;font-size:clamp(17px,5vw,22px);
  color:var(--dark);display:flex;align-items:center;gap:8px;
}
.sec-ttl::after{content:'';flex:1;height:3px;background:linear-gradient(90deg,var(--yellow),transparent);border-radius:3px;}

/* ── CATEGORY GRID ── */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:480px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:680px){.cat-grid{grid-template-columns:repeat(4,1fr);}}

.cat{
  border-radius:20px;padding:18px 12px 14px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  cursor:pointer;border:3px solid transparent;text-align:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  user-select:none;position:relative;overflow:hidden;
}
.cat::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.4),transparent);
  border-radius:17px;
}
.cat:active{transform:scale(.91)!important;}
.cat:hover{transform:scale(1.04) rotate(-1deg);box-shadow:0 10px 28px rgba(0,0,0,.18);}
.ci{font-size:clamp(32px,9vw,44px);filter:drop-shadow(2px 2px 4px rgba(0,0,0,.15));transition:transform .2s;}
.cat:hover .ci{animation:wiggle .4s ease;}
.cl{font-family:'Fredoka One',cursive;font-size:clamp(12px,3.8vw,16px);color:var(--dark);position:relative;z-index:1;}
.cs{font-size:clamp(9px,2.5vw,11px);color:var(--mid);font-weight:800;position:relative;z-index:1;}

/* Category color themes */
.c1{border-color:#FF4757;background:linear-gradient(135deg,#FFF0F1,#FFD6D9);}
.c2{border-color:#2ED573;background:linear-gradient(135deg,#EDFFF4,#C8FFE0);}
.c3{border-color:#FFD32A;background:linear-gradient(135deg,#FFFCE0,#FFF4A3);}
.c4{border-color:#A55EEA;background:linear-gradient(135deg,#F5EEFF,#E0C9FF);}
.c5{border-color:#FF6B9D;background:linear-gradient(135deg,#FFF0F6,#FFD6E8);}
.c6{border-color:#1E90FF;background:linear-gradient(135deg,#EEF7FF,#C9E5FF);}
.c7{border-color:#FF6B35;background:linear-gradient(135deg,#FFF5EE,#FFD9C5);}
.c8{border-color:#70A1FF;background:linear-gradient(135deg,#EEF3FF,#CDD8FF);}
.c9{border-color:#CF6A87;background:linear-gradient(135deg,#FDF0F4,#F9C9D8);}
.c10{border-color:#FF6348;background:linear-gradient(135deg,#FFF2F0,#FFD0C9);}
.c11{border-color:#2ED573;background:linear-gradient(135deg,#F0FFF7,#C8FFE4);}
.c12{border-color:#FF6B35;background:linear-gradient(135deg,#FFF5EE,#FFD0B0);}
.c13{border-color:#9B59B6;background:linear-gradient(135deg,#F5EEFF,#DEC5FF);}

/* ── LEARN HEADER ── */
.lhdr{display:flex;align-items:center;gap:10px;}
.back{
  background:linear-gradient(135deg,#FF4757,#FF6B35);
  border:none;border-radius:50%;width:40px;height:40px;font-size:18px;
  cursor:pointer;box-shadow:0 4px 12px rgba(255,71,87,.4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;
  transition:transform .2s;
}
.back:active{transform:scale(.88);}
.ltitle{font-family:'Fredoka One',cursive;font-size:clamp(16px,5vw,22px);color:var(--dark);}
.prog-wrap-learn{background:#f0f0f0;border-radius:20px;height:10px;overflow:hidden;position:relative;}
.prog-bar-learn{
  height:100%;border-radius:20px;transition:width .6s ease;
  background:linear-gradient(90deg,#FF4757,#FFD32A,#2ED573);
  animation:rainbow 4s linear infinite;background-size:200% 100%;
}

/* ── ITEM CARDS ── */
.items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(min-width:460px){.items-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:600px){.items-grid{grid-template-columns:repeat(5,1fr);}}

.icard{
  background:#fff;border-radius:18px;padding:12px 6px 14px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);cursor:pointer;
  border:3px solid #f0f0f0;text-align:center;
  position:relative;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  user-select:none;overflow:hidden;
}
.icard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#FF4757,#FFD32A,#2ED573,#1E90FF,#A55EEA);
  background-size:300% 100%;animation:rainbow 3s linear infinite;
  opacity:0;transition:opacity .2s;
}
.icard:hover::before,.icard.done::before{opacity:1;}
.icard:hover{transform:scale(1.06) translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.15);}
.icard:active{transform:scale(.91);}
.icard.done{border-color:#2ED573;background:linear-gradient(135deg,#F0FFF7,#fff);}
.icard.done::after{content:'✓';position:absolute;top:4px;right:6px;font-size:11px;font-weight:900;color:#2ED573;}

.icard.speaking{
  border-color:#FF4757!important;
  background:linear-gradient(135deg,#FFF0F1,#fff)!important;
  transform:scale(1.1) translateY(-4px)!important;
  box-shadow:0 8px 28px rgba(255,71,87,.4)!important;
  z-index:5;animation:pulse 1s ease infinite;
}
.icard.speaking::before{opacity:1;}

.ie{font-size:clamp(28px,7.5vw,38px);line-height:1.1;filter:drop-shadow(1px 2px 3px rgba(0,0,0,.1));}
.im{font-family:'Fredoka One',cursive;font-size:clamp(15px,4.5vw,22px);color:var(--dark);}
.is{font-size:clamp(8px,2.4vw,11px);font-weight:800;color:var(--mid);background:#f8f8f8;padding:2px 6px;border-radius:6px;}
.sp{position:absolute;bottom:4px;right:5px;font-size:13px;opacity:.6;}
.color-dot{width:clamp(28px,8vw,36px);height:clamp(28px,8vw,36px);border-radius:50%;border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.2);}

/* ── SPELL CARDS ── */
.spell-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:460px){.spell-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:620px){.spell-grid{grid-template-columns:repeat(4,1fr);}}

.spell-card{
  background:#fff;border-radius:18px;padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);cursor:pointer;
  border:3px solid #f0f0f0;text-align:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);user-select:none;overflow:hidden;
}
.spell-card:hover{transform:scale(1.05) translateY(-3px);}
.spell-card:active{transform:scale(.91);}
.spell-card.done{border-color:#2ED573;background:linear-gradient(135deg,#F0FFF7,#fff);}
.spell-card.speaking{border-color:#FF4757!important;background:#FFF0F1!important;transform:scale(1.08)!important;box-shadow:0 8px 24px rgba(255,71,87,.4)!important;z-index:5;animation:pulse 1s ease infinite;}
.spell-num{font-family:'Fredoka One',cursive;font-size:clamp(26px,7.5vw,36px);color:var(--red);text-shadow:2px 2px 0 rgba(255,71,87,.2);}
.spell-word{font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,17px);color:var(--dark);}
.spell-letters{
  font-size:clamp(9px,2.5vw,12px);font-weight:900;
  color:#fff;background:linear-gradient(135deg,#A55EEA,#6C5CE7);
  padding:3px 8px;border-radius:8px;letter-spacing:2px;word-break:break-all;
}
.spell-hindi{font-size:clamp(8px,2.4vw,10px);color:var(--mid);font-weight:800;background:#f8f8f8;padding:2px 6px;border-radius:6px;}

/* ── MONTH SPELL CARDS ── */
.month-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:460px){.month-grid2{grid-template-columns:repeat(3,1fr);}}
.month-spell-card{
  background:#fff;border-radius:18px;padding:13px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);cursor:pointer;
  border:3px solid #f0f0f0;text-align:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);user-select:none;
}
.month-spell-card:hover{transform:scale(1.05);}
.month-spell-card:active{transform:scale(.91);}
.month-spell-card.done{border-color:#2ED573;background:linear-gradient(135deg,#F0FFF7,#fff);}
.month-spell-card.speaking{border-color:#FF4757!important;background:#FFF0F1!important;transform:scale(1.08)!important;box-shadow:0 8px 24px rgba(255,71,87,.4)!important;z-index:5;animation:pulse 1s ease infinite;}
.ms-emoji{font-size:clamp(28px,8vw,36px);}
.ms-name{font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,17px);color:var(--dark);}
.ms-spell{font-size:clamp(8px,2.4vw,10px);font-weight:900;color:#fff;background:linear-gradient(135deg,#1E90FF,#A55EEA);padding:2px 8px;border-radius:7px;word-break:break-all;}
.ms-hint{font-size:clamp(8px,2.4vw,10px);color:var(--mid);font-weight:800;}

/* ── TABS ── */
.tab-row{display:flex;gap:8px;}
.tab-btn{
  flex:1;padding:10px 4px;border:2px solid #ddd;border-radius:14px;
  background:#fff;font-family:'Fredoka One',cursive;
  font-size:clamp(12px,3.5vw,15px);color:var(--mid);cursor:pointer;
  transition:all .2s;box-shadow:0 3px 8px rgba(0,0,0,.06);
}
.tab-btn.on{
  background:linear-gradient(135deg,#2ED573,#1DD1A1);
  border-color:#2ED573;color:#fff;
  box-shadow:0 5px 14px rgba(46,213,115,.35);transform:scale(1.03);
}

/* ── BUTTONS ── */
.hear-all-btn{
  flex:1;background:linear-gradient(135deg,#FF4757,#FF6B35);
  color:#fff;border:none;border-radius:14px;padding:12px 0;
  font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,15px);
  cursor:pointer;box-shadow:0 5px 16px rgba(255,71,87,.38);
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:transform .15s;
}
.hear-all-btn:active{transform:scale(.95);}
.stop-btn{
  flex:0 0 auto;padding:12px 16px;
  background:linear-gradient(135deg,#747D8C,#A4B0BE);
  color:#fff;border:none;border-radius:14px;
  font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,15px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  opacity:0.45;pointer-events:none;transition:all .2s;
}
.stop-btn.active{
  opacity:1;pointer-events:auto;
  background:linear-gradient(135deg,#E84393,#D63031);
  box-shadow:0 5px 14px rgba(214,48,49,.4);
  animation:pulse 1.5s ease infinite;
}

/* ── OVERLAY / SHEET ── */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.overlay.open{display:flex;}
.sheet{
  background:linear-gradient(180deg,#fff 0%,#FFF8F0 100%);
  border-radius:30px 30px 0 0;padding:24px 20px 44px;
  width:100%;max-width:520px;text-align:center;position:relative;
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 -8px 40px rgba(0,0,0,.2);
}
.sheet-top-bar{width:40px;height:5px;background:#ddd;border-radius:5px;margin:0 auto 18px;}
.oe{font-size:clamp(60px,18vw,96px);margin-bottom:6px;animation:bounceIn .4s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(3px 4px 8px rgba(0,0,0,.15));}
.oc{
  font-family:'Fredoka One',cursive;font-size:clamp(36px,12vw,58px);
  background:linear-gradient(135deg,#FF4757,#FF6B35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.1;
}
.on{font-family:'Fredoka One',cursive;font-size:clamp(20px,6vw,28px);color:var(--dark);margin:8px 0 4px;}
.oh{
  font-size:clamp(11px,3vw,14px);font-weight:800;
  background:linear-gradient(135deg,#A55EEA,#6C5CE7);
  color:#fff;padding:4px 14px;border-radius:20px;display:inline-block;margin-top:4px;
}
.speak-btn{
  margin-top:18px;
  background:linear-gradient(135deg,#FF4757,#FF6B35,#FFD32A);
  background-size:200% 100%;animation:rainbow 3s linear infinite;
  color:#fff;border:none;border-radius:50px;padding:15px 0;
  font-family:'Fredoka One',cursive;font-size:clamp(16px,4.5vw,20px);
  cursor:pointer;width:100%;
  box-shadow:0 6px 20px rgba(255,71,87,.45);
  transition:transform .15s;
}
.speak-btn:active{transform:scale(.96);}
.xbtn{
  position:absolute;top:12px;right:14px;
  background:linear-gradient(135deg,#FF4757,#FF6B35);
  border:none;border-radius:50%;width:34px;height:34px;
  font-size:15px;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(255,71,87,.4);
}

/* ── TABLES ── */
.table-select-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
@media(min-width:380px){.table-select-grid{grid-template-columns:repeat(6,1fr);}}
@media(min-width:500px){.table-select-grid{grid-template-columns:repeat(8,1fr);}}
.tsel-btn{
  background:#fff;border:3px solid #FFD32A;border-radius:14px;
  padding:10px 2px;font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,18px);
  color:var(--dark);cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);text-align:center;
}
.tsel-btn:active{transform:scale(.88);}
.tsel-btn.active-t{
  background:linear-gradient(135deg,#FFD32A,#FF6B35);
  border-color:#FF6B35;color:#fff;
  box-shadow:0 5px 16px rgba(255,107,53,.45);
  transform:scale(1.06);
}
.table-view{background:#fff;border-radius:20px;padding:16px 13px;box-shadow:0 6px 20px rgba(0,0,0,.1);}
.table-title{
  font-family:'Fredoka One',cursive;font-size:clamp(18px,5.5vw,24px);
  background:linear-gradient(135deg,#FF4757,#FF6B35);

  text-align:center;margin-bottom:12px;
}
.table-row{
  display:flex;align-items:center;padding:10px 10px;border-radius:14px;
  margin-bottom:5px;cursor:pointer;transition:all .15s;gap:6px;
}
.table-row:nth-child(odd){background:#FFF8F0;}
.table-row:nth-child(even){background:#F0FFF7;}
.table-row:hover{transform:scale(1.02);box-shadow:0 3px 10px rgba(0,0,0,.08);}
.table-row:active{transform:scale(.97);}
.table-row.speaking{
  background:linear-gradient(135deg,#FFD32A,#FFE066)!important;
  transform:scale(1.04)!important;
  box-shadow:0 6px 18px rgba(255,211,42,.5)!important;
  animation:pulse 1s ease infinite;
}
.tr-eq{font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,18px);color:var(--dark);flex:1;}
.tr-suf{font-size:clamp(9px,2.8vw,12px);color:#fff;font-weight:900;min-width:64px;text-align:center;background:linear-gradient(135deg,#2ED573,#1DD1A1);padding:3px 8px;border-radius:8px;}
.tr-ans{font-family:'Fredoka One',cursive;font-size:clamp(16px,4.5vw,22px);color:var(--red);min-width:38px;text-align:right;text-shadow:1px 1px 0 rgba(255,71,87,.2);}
.tr-sp{font-size:14px;}
.table-nav{display:flex;gap:8px;margin-bottom:12px;}
.tnav-btn{
  flex:1;background:#fff;border:2px solid #ddd;border-radius:12px;
  padding:9px 4px;font-family:'Fredoka One',cursive;font-size:clamp(12px,3.5vw,14px);

}
.tnav-btn:active{transform:scale(.93);}
.say-all-btn{
  width:100%;background:linear-gradient(135deg,#2ED573,#1DD1A1);color:#fff;border:none;
  border-radius:50px;padding:13px 0;font-family:'Fredoka One',cursive;
  font-size:clamp(13px,4vw,16px);cursor:pointer;
  box-shadow:0 5px 16px rgba(46,213,115,.4);margin-top:0;transition:transform .15s;
}
.say-all-btn:active{transform:scale(.96);}

/* ── QUIZ ── */
.qcard{
  background:linear-gradient(135deg,#fff,#FFF8F0);
  border-radius:22px;padding:22px 16px;
  box-shadow:0 8px 24px rgba(0,0,0,.1);text-align:center;
  border:3px solid #FFD32A;
}
.qe{font-size:clamp(64px,18vw,88px);margin-bottom:8px;animation:bounceIn .4s ease;filter:drop-shadow(3px 4px 8px rgba(0,0,0,.15));}
.qt{font-family:'Fredoka One',cursive;font-size:clamp(15px,4.5vw,20px);color:var(--dark);}
.qnum{
  text-align:center;font-size:clamp(11px,3vw,13px);font-weight:900;
  color:#fff;background:linear-gradient(135deg,#A55EEA,#6C5CE7);
  padding:4px 14px;border-radius:20px;display:inline-block;
}
.opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.opt{
  background:#fff;border:3px solid #f0f0f0;border-radius:16px;
  padding:14px 8px;font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,16px);
  cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 12px rgba(0,0,0,.07);
}
.opt:hover{transform:scale(1.04);border-color:#FFD32A;}
.opt:disabled{cursor:default;}
.opt.right{border-color:#2ED573;background:linear-gradient(135deg,#F0FFF7,#fff);color:#00875A;box-shadow:0 5px 16px rgba(46,213,115,.3);}
.opt.wrong{border-color:#FF4757;background:linear-gradient(135deg,#FFF0F1,#fff);color:#C0392B;}
.fb{
  border-radius:16px;padding:14px;text-align:center;
  font-family:'Fredoka One',cursive;font-size:clamp(17px,5vw,22px);display:none;
}
.fb.good{background:linear-gradient(135deg,#F0FFF7,#C8FFE0);color:#00875A;border:3px solid #2ED573;}
.fb.bad{background:linear-gradient(135deg,#FFF0F1,#FFD6D9);color:#C0392B;border:3px solid #FF4757;}
.score-final{
  text-align:center;background:linear-gradient(135deg,#fff,#FFF8F0);
  border-radius:24px;padding:30px 20px;
  box-shadow:0 8px 28px rgba(0,0,0,.12);
  border:3px solid #FFD32A;
}
.btn-green{
  background:linear-gradient(135deg,#2ED573,#1DD1A1);color:#fff;border:none;
  border-radius:50px;padding:14px 0;font-family:'Fredoka One',cursive;
  font-size:clamp(15px,4.5vw,18px);cursor:pointer;width:100%;margin-top:10px;
  box-shadow:0 5px 16px rgba(46,213,115,.4);transition:transform .15s;
}
.btn-green:active{transform:scale(.96);}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:none;display:flex;
  padding:8px 8px 16px;
  box-shadow:0 -4px 20px rgba(0,0,0,.12);z-index:100;
  gap:8px;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;background:#f8f8f8;border:2px solid #f0f0f0;
  border-radius:16px;padding:8px 4px;
  font-size:clamp(9px,2.5vw,11px);font-weight:900;color:var(--mid);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.ni{font-size:clamp(22px,6vw,26px);transition:transform .2s;}
.nb.active{
  background:linear-gradient(135deg,#FF4757,#FF6B35);
  border-color:#FF4757;color:#fff;
  box-shadow:0 5px 16px rgba(255,71,87,.4);
  transform:scale(1.05) translateY(-3px);
}
.nb.active .ni{transform:scale(1.15);}

/* ── GAMES ── */
.game-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.game-menu-card{
  border-radius:22px;padding:20px 14px;text-align:center;cursor:pointer;
  border:3px solid transparent;
  box-shadow:0 6px 20px rgba(0,0,0,.12);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  user-select:none;
}
.game-menu-card:hover{transform:scale(1.05) rotate(-1deg);}
.game-menu-card:active{transform:scale(.92);}
.gmc-icon{font-size:clamp(44px,12vw,60px);margin-bottom:8px;filter:drop-shadow(2px 3px 6px rgba(0,0,0,.15));}
.gmc-name{font-family:'Fredoka One',cursive;font-size:clamp(15px,4.5vw,18px);color:var(--dark);}
.gmc-desc{font-size:clamp(10px,3vw,12px);color:var(--mid);font-weight:800;margin-top:4px;}
.gmc1{background:linear-gradient(135deg,#FFE4E1,#FFD0C9);border-color:#FF6B35;}
.gmc2{background:linear-gradient(135deg,#E4F9FF,#C5EEFF);border-color:#1E90FF;}
.gmc3{background:linear-gradient(135deg,#EDFFF0,#C8FFD4);border-color:#2ED573;}
.gmc4{background:linear-gradient(135deg,#F3E8FF,#E2C9FF);border-color:#A55EEA;}

/* Memory game */
.mem-grid{display:grid;gap:10px;}
.mem-card{
  aspect-ratio:1;border-radius:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,8vw,42px);
  background:linear-gradient(135deg,#A55EEA,#6C5CE7);
  box-shadow:0 5px 14px rgba(108,92,231,.35);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  user-select:none;border:3px solid rgba(255,255,255,.3);
  position:relative;perspective:600px;
}
.mem-card.flipped{background:#fff;border-color:#2ED573;box-shadow:0 5px 14px rgba(46,213,115,.3);}
.mem-card.matched{background:linear-gradient(135deg,#2ED573,#1DD1A1);border-color:#2ED573;animation:bounceIn .4s ease;}
.mem-card.wrong-flash{animation:wrongFlash .4s ease;}
@keyframes wrongFlash{0%,100%{background:linear-gradient(135deg,#A55EEA,#6C5CE7);}50%{background:linear-gradient(135deg,#FF4757,#FF6B35);}}
.mem-back{color:rgba(255,255,255,.0);font-size:28px;}
.mem-front{font-size:clamp(26px,7vw,40px);}

/* Tap game */
.tap-question{
  background:linear-gradient(135deg,#fff,#FFF8F0);border-radius:22px;
  padding:24px 16px;text-align:center;border:3px solid #FFD32A;
  box-shadow:0 8px 24px rgba(0,0,0,.1);margin-bottom:14px;
}
.tap-q-emoji{font-size:clamp(72px,20vw,100px);animation:bounceIn .4s ease;filter:drop-shadow(3px 4px 8px rgba(0,0,0,.15));}
.tap-q-text{font-family:'Fredoka One',cursive;font-size:clamp(16px,4.5vw,20px);color:var(--dark);margin-top:8px;}
.tap-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.tap-opt{
  border-radius:18px;padding:16px 8px;text-align:center;cursor:pointer;
  font-size:clamp(32px,9vw,46px);border:3px solid #f0f0f0;background:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  user-select:none;
}
.tap-opt:hover{transform:scale(1.06);}
.tap-opt:active{transform:scale(.9);}
.tap-opt.right{border-color:#2ED573;background:linear-gradient(135deg,#F0FFF7,#fff);animation:bounceIn .3s ease;}
.tap-opt.wrong{border-color:#FF4757;background:linear-gradient(135deg,#FFF0F1,#fff);}

/* Balloon game */
.balloon-area{position:relative;height:clamp(320px,65vw,480px);overflow:hidden;border-radius:22px;background:linear-gradient(180deg,#87CEEB,#B0E0FF);box-shadow:0 8px 24px rgba(0,0,0,.15);}
.balloon{
  position:absolute;width:clamp(64px,16vw,90px);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  animation:riseUp linear forwards;user-select:none;
}
@keyframes riseUp{from{transform:translateY(100px);}to{transform:translateY(-200px);}}
.balloon-body{
  width:clamp(56px,14vw,78px);height:clamp(68px,17vw,94px);border-radius:50% 50% 45% 45%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:clamp(16px,4.5vw,22px);
  color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.3);
  box-shadow:inset -6px -6px 12px rgba(0,0,0,.15),0 4px 14px rgba(0,0,0,.2);
  transition:transform .1s;
}
.balloon-body:active{transform:scale(.85);}
.balloon-string{width:2px;height:clamp(20px,5vw,30px);background:rgba(0,0,0,.2);}
.balloon-pop{font-size:40px;animation:confetti .5s ease forwards;}
.bal-score{
  position:absolute;top:12px;right:14px;
  background:rgba(255,255,255,.9);border-radius:20px;padding:6px 14px;
  font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,18px);color:var(--dark);
  box-shadow:0 3px 10px rgba(0,0,0,.12);
}
.bal-target{
  position:absolute;top:12px;left:14px;
  background:rgba(255,255,255,.9);border-radius:20px;padding:6px 14px;
  font-family:'Fredoka One',cursive;font-size:clamp(13px,3.8vw,16px);color:var(--orange);
}
.game-stat-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:16px;padding:12px 16px;box-shadow:0 3px 10px rgba(0,0,0,.07);}
.game-stat{font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,18px);color:var(--dark);display:flex;gap:6px;align-items:center;}
.game-btn{
  background:linear-gradient(135deg,#FF4757,#FF6B35);color:#fff;border:none;
  border-radius:50px;padding:12px 24px;font-family:'Fredoka One',cursive;
  font-size:clamp(14px,4vw,17px);cursor:pointer;
  box-shadow:0 5px 16px rgba(255,71,87,.4);transition:transform .15s;
}
.game-btn:active{transform:scale(.95);}
.game-result{
  text-align:center;background:linear-gradient(135deg,#fff,#FFF8F0);
  border-radius:22px;padding:28px 20px;box-shadow:0 8px 24px rgba(0,0,0,.12);border:3px solid #FFD32A;
}

/* Confetti piece */
.confetti-piece{position:fixed;pointer-events:none;z-index:9998;font-size:20px;animation:confetti .9s ease-out forwards;}

/* ── STREAK BADGE ── */
.streak{
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#FFD32A,#FF6B35);
  color:#fff;border-radius:20px;padding:4px 12px;
  font-family:'Fredoka One',cursive;font-size:clamp(12px,3.5vw,14px);
  box-shadow:0 3px 10px rgba(255,107,53,.35);
}
/* ── WORKSHEETS ── */
.ws-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ws-card{border-radius:20px;padding:18px 12px;text-align:center;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.12);transition:transform .2s cubic-bezier(.34,1.56,.64,1);user-select:none;border:3px solid transparent;}
.ws-card:hover{transform:scale(1.04)rotate(-1deg);}
.ws-card:active{transform:scale(.92);}
.ws-icon{font-size:clamp(38px,11vw,52px);margin-bottom:8px;filter:drop-shadow(2px 3px 5px rgba(0,0,0,.15));}
.ws-name{font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,16px);color:var(--dark);}
.ws-desc{font-size:clamp(10px,2.8vw,12px);color:var(--mid);font-weight:800;margin-top:4px;}

/* Fill-in-blank */
.fib-row{display:flex;align-items:center;gap:10px;background:#fff;border-radius:16px;
  padding:14px 14px;box-shadow:0 3px 10px rgba(0,0,0,.07);margin-bottom:10px;flex-wrap:wrap;}
.fib-emoji{font-size:clamp(30px,8vw,40px);}
.fib-word{font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,24px);color:var(--dark);letter-spacing:4px;flex:1;}
.fib-blank{display:inline-block;width:clamp(28px,8vw,38px);height:clamp(34px,9vw,44px);
  border-bottom:4px solid var(--red);margin:0 3px;text-align:center;vertical-align:bottom;
  font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,24px);color:var(--red);}
.fib-status{font-size:20px;}

/* Matching */
.match-container{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.match-col{display:flex;flex-direction:column;gap:8px;}
.match-item{background:#fff;border-radius:14px;padding:11px 10px;text-align:center;
  cursor:pointer;border:3px solid #ddd;box-shadow:0 3px 9px rgba(0,0,0,.07);
  font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,16px);color:var(--dark);
  transition:all .2s;user-select:none;}
.match-item:active{transform:scale(.93);}
.match-item.selected{border-color:#A55EEA;background:#F5EEFF;}
.match-item.matched{border-color:#2ED573;background:#F0FFF7;pointer-events:none;}
.match-item.wrong-flash{animation:wrongFlash .4s ease;}

/* Trace letters */
.trace-canvas-wrap{background:#fff;border-radius:20px;padding:14px;
  box-shadow:0 5px 16px rgba(0,0,0,.1);border:3px solid #FFD32A;margin-bottom:12px;}
.trace-letter-bg{font-family:'Fredoka One',cursive;font-size:clamp(100px,30vw,160px);
  color:rgba(200,200,200,.35);text-align:center;line-height:1;pointer-events:none;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;}
canvas.trace-canvas{border-radius:12px;cursor:crosshair;touch-action:none;
  position:relative;z-index:1;width:100%;display:block;}
.trace-btns{display:flex;gap:8px;margin-top:10px;}
.trace-btn{flex:1;padding:10px 4px;border:none;border-radius:12px;cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,15px);color:#fff;transition:transform .15s;}
.trace-btn:active{transform:scale(.95);}

/* True/False */
.tf-row{background:#fff;border-radius:16px;padding:14px;box-shadow:0 3px 10px rgba(0,0,0,.07);
  margin-bottom:10px;border:2px solid #f0f0f0;}
.tf-stmt{font-family:'Fredoka One',cursive;font-size:clamp(14px,4.2vw,17px);color:var(--dark);margin-bottom:10px;}
.tf-btns{display:flex;gap:8px;}
.tf-btn{flex:1;padding:10px 4px;border:none;border-radius:12px;cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,16px);color:#fff;transition:transform .15s;}
.tf-btn.true-btn{background:linear-gradient(135deg,#2ED573,#1DD1A1);}
.tf-btn.false-btn{background:linear-gradient(135deg,#FF4757,#FF6B35);}
.tf-btn:active{transform:scale(.93);}
.tf-btn:disabled{opacity:.5;cursor:default;}

/* Word search */
.ws-grid-table{border-collapse:collapse;margin:0 auto;}
.ws-grid-table td{width:clamp(28px,8vw,36px);height:clamp(28px,8vw,36px);text-align:center;
  vertical-align:middle;font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,18px);
  border:1px solid #e0e0e0;cursor:pointer;user-select:none;border-radius:4px;transition:background .1s;}
.ws-grid-table td:active{transform:scale(.9);}
.ws-grid-table td.wsel{background:#FFD32A;color:var(--dark);}
.ws-grid-table td.wfound{background:#2ED573;color:#fff;}
.word-list-item{display:inline-block;margin:4px 6px;font-family:'Fredoka One',cursive;
  font-size:clamp(12px,3.5vw,15px);padding:3px 10px;border-radius:8px;
  background:#f0f0f0;color:var(--mid);}
.word-list-item.found{background:#2ED573;color:#fff;text-decoration:line-through;}

/* Handwriting lines */
.hw-line-wrap{background:#fff;border-radius:16px;padding:14px;box-shadow:0 3px 10px rgba(0,0,0,.07);margin-bottom:10px;}
.hw-prompt{font-family:'Fredoka One',cursive;font-size:clamp(28px,8vw,40px);
  color:rgba(180,167,214,.5);text-align:center;letter-spacing:8px;margin-bottom:6px;}
.hw-lines{position:relative;height:clamp(48px,12vw,64px);}
.hw-lines::before,.hw-lines::after,.hw-mid{content:'';position:absolute;left:0;right:0;height:2px;}
.hw-lines::before{top:0;background:#FFD32A;}
.hw-mid-line{position:absolute;top:50%;left:0;right:0;height:1px;background:#ccc;}
.hw-lines::after{bottom:0;background:#FFD32A;}

var vEn=null,vHi=null;
var voiceReady=false;

function loadVoices(){
  var vs=speechSynthesis.getVoices();
  if(!vs||!vs.length)return;
  voiceReady=true;

  // Score voices — strongly prefer neural/premium female en-IN
  var fem=['female','woman','girl','zira','samantha','karen','moira','tessa','fiona',
           'victoria','veena','heera','raveena','priya','deepa','lekha','neerja',
           'allison','ava','nova','aria','jenny','sonia','libby','mia','natasha'];
  var mal=['male','man','boy','david','daniel','alex','fred','rishi','james','tom','google uk english male'];
  var neural=['neural','premium','enhanced','natural','wavenet','studio'];

  function scoreVoice(v,langs){
    var n=(v.name||'').toLowerCase(), l=(v.lang||'').toLowerCase();
    if(!langs.some(function(x){return l.startsWith(x.toLowerCase());}))return -999;
    var s=0;
    // Language preference
    if(l==='en-in')s+=15; else if(l==='en-gb')s+=8; else if(l==='en-au')s+=6; else s+=3;
    // Neural/premium voice boost
    if(neural.some(function(k){return n.indexOf(k)!==-1;}))s+=30;
    // Female preference
    if(fem.some(function(k){return n.indexOf(k)!==-1;}))s+=25;
    // Male penalty
    if(mal.some(function(k){return n.indexOf(k)!==-1;}))s-=30;
    // Google voices tend to be natural
    if(n.indexOf('google')!==-1)s+=10;
    return s;
  }

  var b=-999;
  vs.forEach(function(v){
    var s=scoreVoice(v,['en-in','en-gb','en-au','en-us']);
    if(s>b){b=s;vEn=v;}
  });

  var bh=-999;
  vs.forEach(function(v){
    var s=scoreVoice(v,['hi-in','hi']);
    if(s>bh){bh=s;vHi=v;}
  });
  if(!vHi) vs.forEach(function(v){if((v.lang||'').toLowerCase().startsWith('hi')&&!vHi)vHi=v;});
}

// Natural speech: use commas and dots for natural pausing
// Lower rate = more natural, pitch 1.0 = normal human, not robotic high
var R=0.82, R2=0.78, RS=0.70, P=1.05;

function u(t,hi,r,p){
  var x=new SpeechSynthesisUtterance(t);
  x.rate  = (r!==undefined)?r:R;
  x.pitch = (p!==undefined)?p:P;
  x.volume= 1;
  if(hi&&vHi)       x.voice=vHi;
  else if(!hi&&vEn)  x.voice=vEn;
  return x;
}

// Natural gap — short silent utterance
function gap(){ var x=new SpeechSynthesisUtterance(','); x.rate=10; x.volume=0; return x; }
function sil(){ var x=new SpeechSynthesisUtterance(' '); x.rate=10; x.volume=0; return x; }

function sq(a){ speechSynthesis.cancel(); a.forEach(function(x){ speechSynthesis.speak(x); }); }

function speakItem(item,catKey){
  if(!window.speechSynthesis)return;
  var p=[];
  // All uses: rate ~0.82, pitch ~1.05 = natural human teacher voice
  // Comma in text = natural pause within utterance (most natural method)
  if(catKey==='english_abc'){
    p.push(u(item.char+', for, '+item.name+'.',false,R,P));
    p.push(u(item.name+', means, '+(item.speak||item.hindi)+'.',false,R2,P));
  } else if(catKey==='numbers'){
    p.push(u(item.name+'.',false,R,P));
    p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  } else if(catKey==='spelling'){
    p.push(u(item.name+'.',false,R,P));
    // Spell letters slowly with natural speech rhythm
    var letters=item.spell.replace(/  /g,',').replace(/-/g,', ');
    p.push(u(letters+'.',false,0.68,P));
    p.push(u(item.name+'.',false,R2,P));
  } else if(catKey==='hindi_swar'||catKey==='hindi_vyanjan'){
    p.push(u(item.name+'.',false,R,P));
    var w=item.name.split(' ').pop();
    p.push(u(w+'.',false,R2,P));
  } else if(catKey==='fruits'||catKey==='vegetables'||catKey==='animals'||catKey==='shapes'){
    p.push(u(item.name+'.',false,R,P));
    p.push(u(item.name+', matlab, '+(item.speak||item.name)+'.',false,R2,P));
  } else if(catKey==='colors'){
    p.push(u(item.name+'.',false,R,P));
    p.push(u(item.name+', matlab, '+(item.speak||item.name)+'.',false,R2,P));
  } else if(catKey==='days'){
    p.push(u(item.name+'.',false,R,P));
    p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  } else if(catKey==='months'){
    p.push(u(item.name+'.',false,R,P));
    p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  } else if(catKey==='months_spell'){
    p.push(u(item.name+'.',false,R,P));
    var mletters=item.spell.replace(/-/g,', ');
    p.push(u(mletters+'.',false,0.68,P));
    p.push(u(item.name+'.',false,R2,P));
  } else if(catKey==='body_parts'||catKey==='family'||catKey==='vehicles'||catKey==='birds'||catKey==='flowers'||catKey==='seasons'||catKey==='small_abc'||catKey==='two_letter_words'||catKey==='three_letter_words'||catKey==='my_school'||catKey==='community_helpers'||catKey==='our_food'||catKey==='water_cycle'||catKey==='solar_system'||catKey==='good_habits'||catKey==='living_nonliving'||catKey==='odd_even'||catKey==='national_symbols'){
    p.push(u(item.name+'.',false,R,P));
    p.push(u(item.name+', matlab, '+(item.speak||item.name)+'.',false,R2,P));
  } else if(catKey==='simple_maths'){
    p.push(u(item.speak||item.name,false,R,P));
  } else if(catKey==='opposites'){
    p.push(u(item.name+', opposite is, '+item.opp+'.',false,R,P));
  } else {
    p.push(u(item.name+'.',false,R,P));
    if(item.hindi)p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  }
  sq(p);
}

// ── SPEAK ALL ITEMS ────────────────────────────────────────────────────
var _playToken = 0;

function speakAllItems(items, catKey, cardSelector, onDone) {
  if (!window.speechSynthesis) { if(onDone) onDone(); return; }
  _playToken++;                       // invalidate previous session
  var myToken = _playToken;
  speechSynthesis.cancel();
  var idx = 0;

  function clearHighlight() {
    document.querySelectorAll('.speaking').forEach(function(el){ el.classList.remove('speaking'); });
  }

  function highlightCard(i) {
    clearHighlight();
    var cards = document.querySelectorAll(cardSelector);
    if (cards[i]) {
      cards[i].classList.add('speaking');
      cards[i].scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
  }

  function playNext() {
    if (myToken !== _playToken) { clearHighlight(); return; } // stopped
    if (idx >= items.length) { clearHighlight(); if(onDone) onDone(); return; }
    var itemIdx = idx++;
    highlightCard(itemIdx);
    var parts = buildUtterances(items[itemIdx], catKey);
    if (!parts || !parts.length) { setTimeout(playNext, 100); return; }

    function chainParts(i) {
      if (myToken !== _playToken) { clearHighlight(); return; } // stopped mid-chain
      if (i >= parts.length) { setTimeout(playNext, 320); return; }
      var ut = parts[i];
      ut.onend  = function() { if(myToken===_playToken) chainParts(i+1); };
      ut.onerror= function() { if(myToken===_playToken) chainParts(i+1); };
      speechSynthesis.speak(ut);
    }
    chainParts(0);
  }
  playNext();
}

function stopAll(hearBtn, stopBtn) {
  _playToken++;                        // invalidate running session
  speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(function(el){ el.classList.remove('speaking'); });
  if(hearBtn){ hearBtn.style.opacity=''; hearBtn.style.pointerEvents=''; }
  if(stopBtn){ stopBtn.classList.remove('active'); }
}

function buildUtterances(item, catKey) {
  var p = [];
  if (catKey==='english_abc') {
    p.push(u(item.char+', for, '+item.name+'.',false,R,P));
    p.push(u(item.name+', means, '+(item.speak||item.hindi)+'.',false,R2,P));
  } else if (catKey==='numbers') {
    p.push(u(item.name+'.',false,R,P));
    p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  } else if (catKey==='spelling') {
    p.push(u(item.name+'.',false,R,P));
    var letters=item.spell.replace(/  /g,',').replace(/-/g,', ');
    p.push(u(letters+'.',false,0.68,P));
    p.push(u(item.name+'.',false,R2,P));
  } else if (catKey==='hindi_swar'||catKey==='hindi_vyanjan') {
    p.push(u(item.name+'.',false,R,P));
    var w=item.name.split(' ').pop(); p.push(u(w+'.',false,R2,P));
  } else if (catKey==='fruits'||catKey==='vegetables'||catKey==='animals'||catKey==='shapes') {
    p.push(u(item.name+'.',false,R,P));
    p.push(u(item.name+', means, '+(item.speak||item.hindi)+'.',false,R2,P));
  } else if (catKey==='colors') {
    p.push(u(item.name+'.',false,R,P));
    p.push(u(item.name+', means, '+(item.speak||item.hindi)+'.',false,R2,P));
  } else if (catKey==='days') {
    p.push(u(item.name+'.',false,R,P));
    p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  } else if (catKey==='months') {
    p.push(u(item.name+'.',false,R,P));
    p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  } else if (catKey==='months_spell') {
    p.push(u(item.name+'.',false,R,P));
    var ml=item.spell.replace(/-/g,', ');
    p.push(u(ml+'.',false,0.68,P));
    p.push(u(item.name+'.',false,R2,P));
  } else if(catKey==='body_parts'||catKey==='family'||catKey==='vehicles'||catKey==='birds'||catKey==='flowers'||catKey==='seasons'||catKey==='small_abc'||catKey==='two_letter_words'||catKey==='three_letter_words'||catKey==='my_school'||catKey==='community_helpers'||catKey==='our_food'||catKey==='water_cycle'||catKey==='solar_system'||catKey==='good_habits'||catKey==='living_nonliving'||catKey==='odd_even'||catKey==='national_symbols'){
    p.push(u(item.name+'.',false,R,P));
    p.push(u(item.name+', matlab, '+(item.speak||item.name)+'.',false,R2,P));
  } else if(catKey==='simple_maths'){
    p.push(u(item.speak||item.name,false,R,P));
  } else if(catKey==='opposites'){
    p.push(u(item.name+', opposite is, '+item.opp+'.',false,R,P));
  } else {
    p.push(u(item.name+'.',false,R,P));
    if(item.hindi) p.push(u((item.speak||item.hindi)+'.',false,R2,P));
  }
  return p;
}

function renderQ(){

      +'<div style="font-size:36px;margin:10px 0;letter-spacing:6px">'+s3+'</div>'
      +'<div style="font-family:Fredoka One,cursive;font-size:clamp(16px,4.5vw,20px);color:var(--orange);margin-bottom:14px">'+msg+'</div>'
      +'<button class="speak-btn" style="margin-top:4px" onclick="startQuiz()">🎯 Phir Khelo!</button>'
      +'<button class="btn-green" onclick="goHome()">🏠 Ghar Jao</button>'
      +'</div>';
    addStar(quizRight*10);
    if(pct>=80) showConfetti();
    return;
  }
  var q=quizItems[quizIdx].item,qk=quizItems[quizIdx].catKey;
  var all=[];Object.values(DATA).forEach(function(c){if(c.items)c.items.forEach(function(it){all.push(it);});});
  var wrong=shuf(all.filter(function(i){return i.name!==q.name;})).slice(0,3);
  var opts=shuf([q].concat(wrong));
  body.innerHTML='<div class="qcard"><div class="qe">'+(q.emoji||q.char)+'</div><div class="qt">What is this? &#129300;</div></div>'
    +'<div class="qnum">Question '+(quizIdx+1)+' of '+quizItems.length+'</div>'
    +'<div class="opts">'+opts.map(function(o){return '<button class="opt" data-ans="'+o.name+'">'+(o.emoji||o.char)+' '+o.name+'</button>';}).join('')+'</div>'
    +'<div class="fb" id="fb"></div>';
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.addEventListener('click',function(){ansQ(btn,btn.getAttribute('data-ans'),q.name);});
  });
}

function ansQ(btn,chosen,correct){
  document.querySelectorAll('.opt').forEach(function(b){b.disabled=true;});
  var fb=document.getElementById('fb');
  if(chosen===correct){
    btn.classList.add('right');quizRight++;addStar(10);
    var msg=CORRECT_MSG[Math.floor(Math.random()*CORRECT_MSG.length)];
    fb.innerHTML=msg+' <span style="font-size:.8em;color:var(--mid)">Sahi answer!</span>';
    fb.className='fb good';
    sq([u('Sahi jawab! Zabardast!',false,0.72,P)]);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(function(b){if(b.getAttribute('data-ans')===correct)b.classList.add('right');});
    var msg2=WRONG_MSG[Math.floor(Math.random()*WRONG_MSG.length)];
    fb.innerHTML=msg2+' Sahi: <b>'+correct+'</b>';fb.className='fb bad';
    sq([u('Sahi answer hai '+correct,false,0.70,P)]);
  }
  fb.style.display='block';quizIdx++;setTimeout(renderQ,2100);
}

// ── 1. MEMORY MATCH ────────────────────────────────────────────────────
function startMemory(){
  document.getElementById('gamesTitle').textContent='🃏 Memory Match';
  var body=document.getElementById('gamesBody');
  // Pick 6 pairs from animals+fruits
  var pool=DATA.animals.items.concat(DATA.fruits.items).concat(DATA.colors.items);
  var chosen=shuf(pool).slice(0,6);
  var cards=shuf(chosen.concat(chosen)); // 12 cards
  var flipped=[],matched=0,locked=false,moves=0;

  var cols=4;
  body.innerHTML='<div class="game-stat-row"><div class="game-stat">🔄 Moves: <span id="memMoves">0</span></div><div class="game-stat">✅ <span id="memMatch">0</span>/6</div></div>'
    +'<div class="mem-grid" style="grid-template-columns:repeat('+cols+',1fr);margin-top:10px" id="memGrid"></div>';

  var grid=document.getElementById('memGrid');
  cards.forEach(function(c,i){
    var d=document.createElement('div');
    d.className='mem-card';
    d.innerHTML='<span class="mem-back">❓</span>';
    d.setAttribute('data-idx',''+i);
    d.setAttribute('data-name',c.name);
    d.setAttribute('data-emoji',c.emoji);
    d.addEventListener('click',function(){
      if(locked||d.classList.contains('flipped')||d.classList.contains('matched'))return;
      d.classList.add('flipped');
      d.innerHTML='<span class="mem-front">'+c.emoji+'</span>';
      sq([u(c.name,false,R,P)]);
      flipped.push(d);
      if(flipped.length===2){
        locked=true; moves++;
        document.getElementById('memMoves').textContent=moves;
        if(flipped[0].getAttribute('data-name')===flipped[1].getAttribute('data-name')){
          flipped[0].classList.add('matched'); flipped[1].classList.add('matched');
          matched++; document.getElementById('memMatch').textContent=matched;
          addStar(5); flipped=[]; locked=false;
          sq([u('Shabash! Match mila!',false,R,P)]);
          if(matched===6){
            setTimeout(function(){
              body.innerHTML='<div class="game-result"><div style="font-size:70px">🏆</div>'
                +'<div style="font-family:Fredoka One,cursive;font-size:26px;margin:10px 0">Waah! Sabhi match mile!</div>'
                +'<div style="font-family:Fredoka One,cursive;font-size:18px;color:var(--mid)">'+moves+' moves mein kiya!</div>'
                +'<button class="game-btn" style="margin-top:16px" onclick="startMemory()">🔄 Phir Khelo</button>'
                +'<button class="game-btn" style="margin-top:10px;background:linear-gradient(135deg,#A55EEA,#6C5CE7)" onclick="openGamesMenu()">🎮 Back</button>'
                +'</div>';
              showConfetti(); addStar(20);
              sq([u('Shabash! Bahut badhiya! Sab cards match ho gaye!',false,R,P)]);
            },600);
          }
        } else {
          setTimeout(function(){
            flipped[0].classList.remove('flipped'); flipped[0].innerHTML='<span class="mem-back">❓</span>';
            flipped[1].classList.remove('flipped'); flipped[1].innerHTML='<span class="mem-back">❓</span>';
            flipped=[]; locked=false;
          },900);
        }
      }
    });
    grid.appendChild(d);
  });
}

    }).join('')
    +'</div>';

var balTimer=null,balScore2=0,balMissed=0,balTargetItem=null,balActive=false;
var BAL_COLORS=['#FF4757','#FF6B35','#A55EEA','#1E90FF','#2ED573','#FFD32A','#FF6B9D','#CF6A87'];

function startBalloon(){
  document.getElementById('gamesTitle').textContent='🎈 Balloon Pop!';

    +'<div class="bal-score" style="position:absolute;top:10px;right:12px;background:rgba(255,255,255,.92);border-radius:20px;padding:5px 12px;font-family:Fredoka One,cursive;font-size:16px;color:#333;z-index:20">💥 <span id="balScore">0</span>/10</div>'
    +'<div class="bal-target" style="position:absolute;top:10px;left:12px;background:rgba(255,255,255,.92);border-radius:20px;padding:5px 12px;font-family:Fredoka One,cursive;font-size:14px;color:var(--orange);z-index:20">🎯 <b>'+balTargetItem.char+' = '+balTargetItem.name+'</b></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:16px;padding:11px 15px;box-shadow:0 3px 10px rgba(0,0,0,.07);margin-top:10px">'
    +'<div style="font-family:Fredoka One,cursive;font-size:16px;color:var(--dark)">Find: <b style="color:var(--red)">'+balTargetItem.char+' ('+balTargetItem.name+')</b></div>'
    +'<div style="font-family:Fredoka One,cursive;font-size:16px;color:var(--dark)">❌ <span id="balMissed">0</span>/3</div>'
    +'</div>';

  sq([u('Pop the balloon showing '+balTargetItem.name+'! Number '+balTargetItem.char+'!',false,R,P)]);

  // Spawn first balloon immediately, then every 1.8s
  spawnBalloon();
  balTimer=setInterval(function(){ if(balActive) spawnBalloon(); },1800);

  // Auto-end after 45 seconds
  setTimeout(function(){
    if(balActive){ balActive=false; clearInterval(balTimer); endBalloon(balScore2,false); }
  },45000);
}

function spawnBalloon(){
  var area=document.getElementById('balArea');
  if(!area||!balTargetItem) return;

  var nums=DATA.numbers.items.slice(0,20);
  // 40% chance of spawning correct balloon
  var isCorrect=(Math.random()<0.40);
  var item=isCorrect
    ? balTargetItem
    : (function(){ var others=nums.filter(function(x){return x.name!==balTargetItem.name;}); return shuf(others)[0]; })();

  var color=BAL_COLORS[Math.floor(Math.random()*BAL_COLORS.length)];
  var dur=(5+Math.random()*3); // 5-8 seconds
  var leftPct=5+Math.floor(Math.random()*72); // 5-77%

  var bal=document.createElement('div');
  bal.style.cssText='position:absolute;bottom:-140px;left:'+leftPct+'%;display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none;z-index:10;';
  bal.style.animation='riseUp '+dur.toFixed(1)+'s linear forwards';

  // Balloon body: big digit + small word
  var bdy=document.createElement('div');
  bdy.style.cssText='width:70px;height:86px;border-radius:50% 50% 45% 45%;background:'+color
    +';display:flex;flex-direction:column;align-items:center;justify-content:center;'
    +'box-shadow:inset -5px -5px 10px rgba(0,0,0,.18),0 4px 14px rgba(0,0,0,.22);'
    +'color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.3);transition:transform .1s;';
  bdy.innerHTML='<div style="font-family:Fredoka One,cursive;font-size:26px;line-height:1.1">'+item.char+'</div>'
    +'<div style="font-size:10px;font-weight:800;opacity:.9;padding:0 4px;text-align:center;line-height:1.2">'+item.name+'</div>';

  var str=document.createElement('div');
  str.style.cssText='width:2px;height:28px;background:rgba(0,0,0,.22);';

  bal.appendChild(bdy);
  bal.appendChild(str);

  bdy.addEventListener('click',function(){
    if(!balActive) return;
    bdy.style.pointerEvents='none'; // prevent double tap

    if(item.name===balTargetItem.name){
      // CORRECT ✅
      bdy.innerHTML='💥';
      bdy.style.fontSize='36px';
      bdy.style.background='transparent';
      bdy.style.boxShadow='none';
      addStar(5);
      balScore2++;
      var sc=document.getElementById('balScore');
      if(sc) sc.textContent=balScore2;
      if(balScore2>=10){
        balActive=false; clearInterval(balTimer);
        sq([u('Waah! Sab balloons pop kar diye! Brilliant!',false,R,P)]);
        setTimeout(function(){ endBalloon(balScore2,true); },500);
      } else {
        sq([u('Sahi! '+item.name+'!',false,R,P)]);
        setTimeout(function(){ if(bal.parentNode) bal.remove(); },350);
      }
    } else {
      // WRONG ❌
      bdy.style.opacity='0.25';
      balMissed++;
      var ms=document.getElementById('balMissed');
      if(ms) ms.textContent=balMissed;
      sq([u('Nahi! '+item.name+' nahi. '+balTargetItem.name+' dhundo!',false,R,P)]);
      if(balMissed>=3){
        balActive=false; clearInterval(balTimer);
        setTimeout(function(){ endBalloon(balScore2,false); },500);
      } else {
        setTimeout(function(){ if(bal.parentNode) bal.remove(); },350);
      }
    }
  });

  bal.addEventListener('animationend',function(){
    if(bal.parentNode) bal.remove();
  });

  area.appendChild(bal);
}

function endBalloon(score,won){
  clearInterval(balTimer); balActive=false;
  var body=document.getElementById('gamesBody');
  body.innerHTML='<div class="game-result">'
    +'<div style="font-size:72px">'+(won?'🏆':'😊')+'</div>'
    +'<div style="font-family:Fredoka One,cursive;font-size:22px;margin:10px 0">'+(won?'Shabash! Jeet gaye!':'Koi baat nahi! Practice karo!')+'</div>'

    +'<button class="game-btn" style="margin-top:10px;background:linear-gradient(135deg,#A55EEA,#6C5CE7)" onclick="openGamesMenu()">🎮 Back</button>'
    +'</div>';
  if(won){ showConfetti(); addStar(20); }
}

// 🔤 GAME 5 — WORD SCRAMBLE
// Scramble the letters of a word, kid taps letters in correct order
// ══════════════════════════════════════════════════════════════════════
var scrScore=0,scrTotal=8,scrQ2=0,scrCurrentItem=null;
function startScramble(){
  document.getElementById('gamesTitle').textContent='🔤 Word Scramble';
  scrScore=0; scrQ2=0;
  showScrambleQ();
}

function showScrHint(){
  if(!scrCurrentItem) return;
  var box=document.getElementById('scrHintBox');
  var btn=document.getElementById('scrHintBtn');
  if(!box) return;
  box.style.display='block';
  box.innerHTML='💡 '+scrCurrentItem.emoji+' &nbsp; <b>'+scrCurrentItem.name+'</b>'
    +(scrCurrentItem.hindi ? ' &nbsp;|&nbsp; '+scrCurrentItem.hindi : '');
  btn.style.opacity='0.5';
  btn.style.pointerEvents='none';
  // Speak the word as hint
  sq([u('Hint! The word is '+scrCurrentItem.name+'. '+(scrCurrentItem.speak||scrCurrentItem.name),false,R,P)]);
}

function showScrambleQ(){
  var body=document.getElementById('gamesBody');
  if(scrQ2>=scrTotal){
    var pct=Math.round(scrScore/scrTotal*100);
    body.innerHTML='<div class="game-result">'
      +'<div style="font-size:72px">'+(pct>=70?'🏆':'🌟')+'</div>'
      +'<div style="font-family:Fredoka One,cursive;font-size:24px;margin:10px 0">'+(pct>=70?'Zabardast!':'Achha try!')+'</div>'
      +'<div style="font-family:Fredoka One,cursive;font-size:18px;color:var(--mid)">'+scrScore+'/'+scrTotal+' sahi</div>'
      +'<button class="game-btn" style="margin-top:16px" onclick="startScramble()">🔄 Phir Khelo</button>'
      +'<button class="game-btn" style="margin-top:10px;background:linear-gradient(135deg,#A55EEA,#6C5CE7)" onclick="openGamesMenu()">🎮 Back</button>'
      +'</div>';
    addStar(scrScore*5); if(pct>=70) showConfetti();
    return;
  }

  // Only use 4-6 letter words for kids
  var pool=DATA.fruits.items.concat(DATA.animals.items).concat(DATA.colors.items).concat(DATA.vegetables.items);
  pool=pool.filter(function(x){ return x.name.length>=3 && x.name.length<=7 && x.name.indexOf(' ')===-1; });
  var item=shuf(pool)[0];
  scrCurrentItem=item;
  scrQ2++;

  // Scramble letters
  var letters=item.name.toUpperCase().split('');
  var scrambled=shuf(letters.slice());
  // Make sure it's actually scrambled
  var tries=0;
  while(scrambled.join('')===letters.join('') && tries<20){ scrambled=shuf(letters.slice()); tries++; }

  var selected=[]; // indexes of tapped letters
  var letterDivs=[];

  body.innerHTML=
    '<div class="game-stat-row"><div class="game-stat">⭐ '+scrScore+'</div><div class="game-stat">'+scrQ2+'/'+scrTotal+'</div></div>'
    +'<div style="background:#fff;border-radius:22px;padding:20px 16px;box-shadow:0 6px 20px rgba(0,0,0,.1);margin-top:12px;text-align:center;border:3px solid #FFD32A">'
    +'<div style="font-size:clamp(60px,16vw,80px);margin-bottom:8px;filter:drop-shadow(2px 3px 6px rgba(0,0,0,.15))">'+item.emoji+'</div>'
    +'<div style="font-family:Fredoka One,cursive;font-size:clamp(15px,4.5vw,18px);color:var(--mid);margin-bottom:14px">Yeh kya hai? Letters sahi karo!</div>'
    // Hint button
    +'<button id="scrHintBtn" onclick="showScrHint()" style="background:linear-gradient(135deg,#FFD32A,#FF6B35);color:#fff;border:none;border-radius:50px;padding:8px 22px;font-family:Fredoka One,cursive;font-size:clamp(13px,3.8vw,15px);cursor:pointer;box-shadow:0 4px 12px rgba(255,107,53,.35);margin-bottom:14px;transition:transform .15s">💡 Hint Suno!</button>'
    +'<div id="scrHintBox" style="display:none;font-family:Fredoka One,cursive;font-size:clamp(14px,4vw,17px);color:var(--purple);background:#F5EEFF;border-radius:14px;padding:10px 14px;margin-bottom:14px;border:2px solid var(--purple)"></div>'
    // Answer boxes
    +'<div id="scrAnswer" style="display:flex;justify-content:center;gap:8px;margin-bottom:18px;flex-wrap:wrap">'
    +letters.map(function(){ return '<div style="width:clamp(32px,9vw,44px);height:clamp(38px,10vw,52px);border-radius:10px;border:3px dashed #ccc;display:flex;align-items:center;justify-content:center;font-family:Fredoka One,cursive;font-size:clamp(16px,5vw,24px);color:var(--dark)"></div>'; }).join('')
    +'</div>'
    // Scrambled letter buttons
    +'<div id="scrLetters" style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap">'
    +scrambled.map(function(l,i){
      return '<div class="scr-letter" data-idx="'+i+'" data-letter="'+l+'" '
        +'style="width:clamp(36px,10vw,50px);height:clamp(42px,11vw,58px);border-radius:12px;'
        +'background:linear-gradient(135deg,#A55EEA,#6C5CE7);color:#fff;'
        +'display:flex;align-items:center;justify-content:center;'
        +'font-family:Fredoka One,cursive;font-size:clamp(18px,5.5vw,26px);'
        +'cursor:pointer;box-shadow:0 4px 12px rgba(165,94,234,.4);'
        +'transition:transform .15s;user-select:none;">'+l+'</div>';
    }).join('')
    +'</div>'
    +'<div id="scrFb" style="margin-top:14px;font-family:Fredoka One,cursive;font-size:20px;min-height:28px"></div>'
    +'</div>';

  // Wire letter clicks
  var ansBoxes=document.querySelectorAll('#scrAnswer div');
  document.querySelectorAll('.scr-letter').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(btn.style.opacity==='0.2') return;
      var letter=btn.getAttribute('data-letter');
      // Place in next empty answer box
      var nextEmpty=-1;
      for(var i=0;i<ansBoxes.length;i++){
        if(ansBoxes[i].textContent===''){nextEmpty=i;break;}
      }
      if(nextEmpty===-1) return;
      ansBoxes[nextEmpty].textContent=letter;
      ansBoxes[nextEmpty].style.borderColor='#A55EEA';
      ansBoxes[nextEmpty].style.background='#F5EEFF';
      btn.style.opacity='0.2';
      btn.style.pointerEvents='none';
      selected.push({letter:letter,btnEl:btn,boxIdx:nextEmpty});
      sq([u(letter,false,0.9,P)]);

      // Check if all filled
      if(selected.length===letters.length){
        var typed=selected.map(function(s){return s.letter;}).join('');
        var fb=document.getElementById('scrFb');
        if(typed===item.name.toUpperCase()){
          fb.innerHTML='🎉 Sahi! '+item.name+'!';
          fb.style.color='#2ED573';
          scrScore++; addStar(8);
          sq([u('Zabardast! '+item.name,false,R,P)]);
          document.querySelectorAll('#scrAnswer div').forEach(function(b){ b.style.background='#F0FFF7'; b.style.borderColor='#2ED573'; });
          setTimeout(showScrambleQ,1800);
        } else {
          fb.innerHTML='😅 Galat! Dobara try karo!';
          fb.style.color='#FF4757';
          sq([u('Galat! Try again!',false,R,P)]);
          // Reset after 1.2s
          setTimeout(function(){
            selected.forEach(function(s){
              ansBoxes[s.boxIdx].textContent='';
              ansBoxes[s.boxIdx].style.borderColor='#ccc';
              ansBoxes[s.boxIdx].style.background='';
              s.btnEl.style.opacity='1';
              s.btnEl.style.pointerEvents='auto';
            });
            selected=[];
            fb.innerHTML='';
          },1200);
        }
      }
    });
  });

  sq([u('Arrange the letters to spell '+item.name,false,R,P)]);
}

// ❓ GAME 6 — MISSING LETTER
// Show a word with one letter missing, tap the correct letter
// ══════════════════════════════════════════════════════════════════════
var mlScore=0,mlTotal=8,mlQ=0;
function startMissingLetter(){
  document.getElementById('gamesTitle').textContent='❓ Missing Letter';
  mlScore=0; mlQ=0;
  showMissingQ();
}

function showMissingQ(){
  var body=document.getElementById('gamesBody');
  if(mlQ>=mlTotal){
    var pct=Math.round(mlScore/mlTotal*100);
    body.innerHTML='<div class="game-result">'
      +'<div style="font-size:72px">'+(pct>=70?'🏆':'🌟')+'</div>'
      +'<div style="font-family:Fredoka One,cursive;font-size:24px;margin:10px 0">'+(pct>=70?'Shandaar!':'Practice karo!')+'</div>'
      +'<div style="font-family:Fredoka One,cursive;font-size:18px;color:var(--mid)">'+mlScore+'/'+mlTotal+' sahi</div>'
      +'<button class="game-btn" style="margin-top:16px" onclick="startMissingLetter()">🔄 Phir Khelo</button>'
      +'<button class="game-btn" style="margin-top:10px;background:linear-gradient(135deg,#A55EEA,#6C5CE7)" onclick="openGamesMenu()">🎮 Back</button>'
      +'</div>';
    addStar(mlScore*5); if(pct>=70) showConfetti();
    return;
  }

  var pool=DATA.fruits.items.concat(DATA.animals.items).concat(DATA.vegetables.items).concat(DATA.english_abc.items);
  pool=pool.filter(function(x){ return x.name.length>=3 && x.name.indexOf(' ')===-1; });
  var item=shuf(pool)[0];
  mlQ++;

  // Pick a random position to hide
  var word=item.name.toUpperCase();
  var hideIdx=Math.floor(Math.random()*(word.length));
  var correctLetter=word[hideIdx];

  // Wrong options: 3 different letters
  var alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(function(c){ return c!==correctLetter; });
  var wrongs=shuf(alpha).slice(0,3);
  var opts=shuf([correctLetter].concat(wrongs));

  // Build display word with blank
  var displayWord=word.split('').map(function(c,i){
    if(i===hideIdx) return '<span style="display:inline-block;width:clamp(28px,8vw,38px);height:clamp(36px,9vw,46px);'
      +'border-bottom:4px solid #FF4757;margin:0 2px;color:#FF4757;font-size:clamp(22px,6vw,32px);">?</span>';
    return '<span style="margin:0 2px;font-size:clamp(22px,6vw,32px)">'+c+'</span>';
  }).join('');

  body.innerHTML=
    '<div class="game-stat-row"><div class="game-stat">⭐ '+mlScore+'</div><div class="game-stat">'+mlQ+'/'+mlTotal+'</div></div>'
    +'<div style="background:#fff;border-radius:22px;padding:20px 16px;box-shadow:0 6px 20px rgba(0,0,0,.1);margin-top:12px;text-align:center;border:3px solid #1E90FF">'
    +'<div style="font-size:clamp(56px,15vw,76px);margin-bottom:10px;filter:drop-shadow(2px 3px 6px rgba(0,0,0,.15))">'+item.emoji+'</div>'
    +'<div style="font-family:Fredoka One,cursive;margin-bottom:16px;letter-spacing:4px">'+displayWord+'</div>'
    +'<div style="font-family:Fredoka One,cursive;font-size:14px;color:var(--mid);margin-bottom:16px">Kaunsa letter missing hai?</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'
    +opts.map(function(l){
      return '<div class="ml-opt" data-letter="'+l+'" data-correct="'+correctLetter+'"'
        +' style="border-radius:14px;padding:16px 4px;text-align:center;cursor:pointer;'
        +'font-family:Fredoka One,cursive;font-size:clamp(22px,7vw,32px);'
        +'background:linear-gradient(135deg,#EEF7FF,#fff);border:3px solid #1E90FF;'
        +'box-shadow:0 4px 12px rgba(30,144,255,.2);transition:transform .15s;user-select:none;">'+l+'</div>';
    }).join('')
    +'</div>'
    +'<div id="mlFb" style="margin-top:14px;font-family:Fredoka One,cursive;font-size:20px;min-height:28px"></div>'
    +'</div>';

  sq([u('What is the missing letter in '+item.name+'?',false,R,P)]);

  document.querySelectorAll('.ml-opt').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.ml-opt').forEach(function(b){ b.style.pointerEvents='none'; });
      var fb=document.getElementById('mlFb');
      if(btn.getAttribute('data-letter')===correctLetter){
        btn.style.background='linear-gradient(135deg,#F0FFF7,#C8FFE4)';
        btn.style.borderColor='#2ED573';
        fb.innerHTML='🎉 Sahi! '+word[hideIdx]+' for '+item.name+'!';
        fb.style.color='#2ED573';
        mlScore++; addStar(6);
        sq([u('Correct! '+correctLetter+'. '+item.name,false,R,P)]);
      } else {
        btn.style.background='linear-gradient(135deg,#FFF0F1,#FFD6D9)';
        btn.style.borderColor='#FF4757';
        document.querySelectorAll('.ml-opt').forEach(function(b){
          if(b.getAttribute('data-letter')===correctLetter){
            b.style.background='linear-gradient(135deg,#F0FFF7,#C8FFE4)';
            b.style.borderColor='#2ED573';
          }
        });
        fb.innerHTML='😅 Galat! Sahi tha: '+correctLetter;
        fb.style.color='#FF4757';
        sq([u('Galat. Sahi letter tha '+correctLetter,false,R,P)]);
      }
      setTimeout(showMissingQ,1700);
    });
  });
}

// 🔵 GAME 8 — COUNT THE DOTS
// Show random dots, tap the correct number
// ══════════════════════════════════════════════════════════════════════
var dotScore=0,dotTotal=10,dotQ=0;
function startDotCount(){
  document.getElementById('gamesTitle').textContent='🔵 Count the Dots!';
  dotScore=0; dotQ=0;
  showDotQ();
}

var DOT_COLORS=['#FF4757','#1E90FF','#2ED573','#FFD32A','#A55EEA','#FF6B9D','#FF6B35'];

function showDotQ(){
  var body=document.getElementById('gamesBody');
  if(dotQ>=dotTotal){
    var pct=Math.round(dotScore/dotTotal*100);
    body.innerHTML='<div class="game-result">'
      +'<div style="font-size:72px">'+(pct>=80?'🏆':pct>=60?'🥈':'🌟')+'</div>'
      +'<div style="font-family:Fredoka One,cursive;font-size:24px;margin:10px 0">'+(pct>=80?'Counting Master!':pct>=60?'Bahut Achha!':'Practice karo!')+'</div>'
      +'<div style="font-family:Fredoka One,cursive;font-size:18px;color:var(--mid)">'+dotScore+'/'+dotTotal+' sahi</div>'
      +'<button class="game-btn" style="margin-top:16px" onclick="startDotCount()">🔄 Phir Khelo</button>'
      +'<button class="game-btn" style="margin-top:10px;background:linear-gradient(135deg,#A55EEA,#6C5CE7)" onclick="openGamesMenu()">🎮 Back</button>'
      +'</div>';
    addStar(dotScore*6); if(pct>=80) showConfetti();
    return;
  }

  // Difficulty: starts easy (1-5), gets harder (up to 20)
  var maxNum=Math.min(5+Math.floor(dotQ/2)*3,20);
  var correct=Math.floor(Math.random()*maxNum)+1;
  dotQ++;

  // Generate wrong options near the correct answer
  var wrongSet=new Set();
  while(wrongSet.size<3){
    var w=correct+Math.floor(Math.random()*7)-3;
    if(w>0 && w<=20 && w!==correct) wrongSet.add(w);
  }
  var opts=shuf([correct].concat(Array.from(wrongSet)));
  var dotColor=DOT_COLORS[Math.floor(Math.random()*DOT_COLORS.length)];
  var dotEmoji=['🔵','🔴','🟢','🟡','🟣','🟠'][Math.floor(Math.random()*6)];

  // Arrange dots in rows of 5
  var dotHtml='';
  for(var i=0;i<correct;i++){
    if(i>0&&i%5===0) dotHtml+='<br style="margin:4px 0">';
    dotHtml+='<span style="display:inline-block;width:clamp(28px,7vw,38px);height:clamp(28px,7vw,38px);'
      +'border-radius:50%;background:'+dotColor+';margin:3px;'
      +'box-shadow:0 3px 8px rgba(0,0,0,.2);"></span>';
  }

  body.innerHTML=
    '<div class="game-stat-row">'
    +'<div class="game-stat">⭐ '+dotScore+'</div>'
    +'<div class="game-stat" style="font-size:13px;color:var(--mid)">Level '+(Math.floor(dotQ/2)+1)+'</div>'
    +'<div class="game-stat">'+dotQ+'/'+dotTotal+'</div>'
    +'</div>'
    +'<div style="background:#fff;border-radius:22px;padding:20px 16px;box-shadow:0 6px 20px rgba(0,0,0,.1);margin-top:12px;text-align:center;border:3px solid '+dotColor+'">'
    +'<div style="font-family:Fredoka One,cursive;font-size:clamp(15px,4.5vw,18px);color:var(--mid);margin-bottom:14px">Kitne dots hain? Gino! 🤔</div>'
    +'<div style="min-height:clamp(90px,24vw,140px);display:flex;align-items:center;justify-content:center;flex-wrap:wrap;background:#F8F8FF;border-radius:16px;padding:16px;margin-bottom:18px;line-height:1.8">'+dotHtml+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'
    +opts.map(function(n){
      return '<div class="dot-opt" data-n="'+n+'" data-correct="'+correct+'"'
        +' style="border-radius:14px;padding:clamp(12px,3.5vw,18px) 4px;text-align:center;cursor:pointer;'
        +'font-family:Fredoka One,cursive;font-size:clamp(20px,6vw,28px);'
        +'background:#fff;border:3px solid '+dotColor+';'
        +'box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .2s;user-select:none;">'+n+'</div>';
    }).join('')
    +'</div>'
    +'<div id="dotFb" style="margin-top:14px;font-family:Fredoka One,cursive;font-size:20px;min-height:28px"></div>'
    +'</div>';

  sq([u('Count the dots and tap the right number!',false,R,P)]);

  document.querySelectorAll('.dot-opt').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.dot-opt').forEach(function(b){ b.style.pointerEvents='none'; });
      var fb=document.getElementById('dotFb');
      var num=parseInt(btn.getAttribute('data-n'));
      if(num===correct){
        btn.style.background='linear-gradient(135deg,#F0FFF7,#C8FFE4)';
        btn.style.borderColor='#2ED573';
        var numItem=DATA.numbers.items[correct-1];
        fb.innerHTML='🎉 Sahi! '+correct+' = '+(numItem?numItem.name:'')+'!';
        fb.style.color='#2ED573';
        dotScore++; addStar(6);
        sq([u('Sahi! '+correct+'. '+(numItem?numItem.name:''),false,R,P)]);
      } else {
        btn.style.background='linear-gradient(135deg,#FFF0F1,#FFD6D9)';
        btn.style.borderColor='#FF4757';
        document.querySelectorAll('.dot-opt').forEach(function(b){
          if(parseInt(b.getAttribute('data-n'))===correct){
            b.style.background='linear-gradient(135deg,#F0FFF7,#C8FFE4)';
            b.style.borderColor='#2ED573';
          }
        });
        var numItem2=DATA.numbers.items[correct-1];
        fb.innerHTML='😅 Galat! Sahi tha: '+correct+(numItem2?' ('+numItem2.name+')':'');
        fb.style.color='#FF4757';
        sq([u('Galat. Sahi tha '+correct,false,R,P)]);
      }
      setTimeout(showDotQ,1800);
    });
  });
}

function clearTrace(){

  var ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height);
}

function initCanvas(id){
  var canvas=document.getElementById(id); if(!canvas)return;
  canvas.width=canvas.offsetWidth||300;
  var ctx=canvas.getContext('2d');
  ctx.strokeStyle='#FF4757'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round';
  var drawing=false, lx=0, ly=0;

  function getPos(e){
    var r=canvas.getBoundingClientRect();
    var t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left)*(canvas.width/r.width), y:(t.clientY-r.top)*(canvas.height/r.height)};
  }
  function start(e){ e.preventDefault(); drawing=true; var p=getPos(e); lx=p.x; ly=p.y; }
  function move(e){ e.preventDefault(); if(!drawing)return; var p=getPos(e);
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; }
  function stop(){ drawing=false; }

  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',stop); canvas.addEventListener('mouseleave',stop);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',stop);
}

function wsFillBlank(){
  document.getElementById('wsTitle').textContent='🔤 Fill in the Blank';
  var b=document.getElementById('wsBody');
  // Words with one letter hidden
  var pool=DATA.fruits.items.concat(DATA.animals.items).concat(DATA.three_letter_words.items);
  pool=pool.filter(function(x){ return x.name.indexOf(' ')===-1 && x.name.length>=3 && x.name.length<=6; });
  var chosen=shuf(pool).slice(0,10);
  var score=0;

  var html='<div style="font-family:Fredoka One,cursive;font-size:14px;color:var(--mid);margin-bottom:12px">Sahi letter likhkar blank bharo ✏️</div>';
  chosen.forEach(function(item,qi){
    var word=item.name.toUpperCase();
    var hideIdx=Math.floor(Math.random()*(word.length-1))+1; // don't hide first letter
    var correct=word[hideIdx];
    var displayArr=word.split('').map(function(c,i){
      return i===hideIdx?'_':c;
    });
    html+='<div class="fib-row" id="fibRow'+qi+'">'
      +'<span class="fib-emoji">'+item.emoji+'</span>'
      +'<span class="fib-word">'+displayArr.map(function(c,i){
          return i===hideIdx
            ? '<input id="fibIn'+qi+'" type="text" maxlength="1" data-correct="'+correct+'" data-qi="'+qi+'"'
              +' style="width:clamp(28px,8vw,38px);height:clamp(32px,9vw,40px);border:none;border-bottom:4px solid var(--red);'
              +'text-align:center;font-family:Fredoka One,cursive;font-size:clamp(18px,5vw,22px);'
              +'color:var(--red);background:transparent;outline:none;text-transform:uppercase">'
            : '<span style="padding:0 2px">'+c+'</span>';
        }).join('')+'</span>'
      +'<span class="fib-status" id="fibSt'+qi+'"></span>'
      +'</div>';
  });
  html+='<button onclick="checkFillBlanks('+chosen.length+')" style="width:100%;background:linear-gradient(135deg,#FF4757,#FF6B35);'
    +'color:#fff;border:none;border-radius:50px;padding:14px 0;font-family:Fredoka One,cursive;'
    +'font-size:clamp(15px,4.5vw,18px);cursor:pointer;margin-top:6px;box-shadow:0 5px 14px rgba(255,71,87,.38)">✅ Check Answers</button>'
  +'<div id="fibResult" style="font-family:Fredoka One,cursive;font-size:18px;text-align:center;margin-top:10px;min-height:24px"></div>';
  b.innerHTML=html;

  // Auto-check on each input
  chosen.forEach(function(item,qi){
    var inp=document.getElementById('fibIn'+qi);
    if(inp) inp.addEventListener('input',function(){
      this.value=this.value.toUpperCase();
    });
  });
}

function checkFillBlanks(total){
  var score=0;
  for(var i=0;i<total;i++){
    var inp=document.getElementById('fibIn'+i);
    var st=document.getElementById('fibSt'+i);
    var row=document.getElementById('fibRow'+i);
    if(!inp) continue;
    if(inp.value.toUpperCase()===inp.getAttribute('data-correct')){
      st.innerHTML='✅'; inp.style.borderColor='#2ED573'; inp.style.color='#2ED573';
      row.style.borderColor='#2ED573'; score++;
    } else {
      st.innerHTML='❌ <span style="font-size:13px;color:#FF4757">'+inp.getAttribute('data-correct')+'</span>';
      inp.style.borderColor='#FF4757'; inp.style.color='#FF4757';
      row.style.borderColor='#FF4757';
    }
  }
  var pct=Math.round(score/total*100);
  var r=document.getElementById('fibResult');
  r.innerHTML=(pct>=80?'🎉':'💪')+' '+score+'/'+total+' Sahi! '+(pct>=80?'Zabardast!':'Keep practicing!');
  r.style.color=pct>=80?'#2ED573':'#FF4757';
  addStar(score*4);
  if(pct>=80) showConfetti();

        var side=el.getAttribute('data-side'), id=el.getAttribute('data-id');
        if(!selected){
          selected={side:side,id:id,el:el}; el.classList.add('selected');
        } else {
          if(selected.side===side){ selected.el.classList.remove('selected'); selected={side:side,id:id,el:el}; el.classList.add('selected'); return; }
          if(selected.id===id){
            // Match!
            el.classList.add('matched'); selected.el.classList.add('matched'); selected.el.classList.remove('selected');
            var item=pairs.find(function(p){return p.name===id;});

            matched++; addStar(5);

            rightItems.find(function(x){return x.id===id;}).done=true;
