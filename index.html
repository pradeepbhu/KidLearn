}

// ── 4. WORD SEARCH ─────────────────────────────────────────────────────
function wsWordSearch(){
  document.getElementById('wsTitle').textContent='🔍 Word Search';
  var b=document.getElementById('wsBody');
  var WORDS=['CAT','DOG','COW','HEN','SUN','BUS','ANT','BEE','FLY','EGG'];
  var SIZE=9;
  var grid=[];
  var placed=[];
  // Init grid with dots
  for(var r=0;r<SIZE;r++){ grid[r]=[]; for(var c2=0;c2<SIZE;c2++) grid[r][c2]='.'; }

  // Place words
  function placeWord(word){
    for(var att=0;att<80;att++){
      var dir=Math.random()<0.5?'H':'V';
      var row=Math.floor(Math.random()*SIZE);
      var col=Math.floor(Math.random()*SIZE);
      var fits=true;
      for(var i=0;i<word.length;i++){
        var nr=dir==='V'?row+i:row, nc=dir==='H'?col+i:col;
        if(nr>=SIZE||nc>=SIZE){fits=false;break;}
        if(grid[nr][nc]!=='.'&&grid[nr][nc]!==word[i]){fits=false;break;}
      }
      if(fits){
        var cells=[];
        for(var i2=0;i2<word.length;i2++){
          var nr2=dir==='V'?row+i2:row, nc2=dir==='H'?col+i2:col;
          grid[nr2][nc2]=word[i2]; cells.push([nr2,nc2]);
        }
        placed.push({word:word,cells:cells});
        return true;
      }
    }
    return false;
  }
  WORDS.forEach(function(w){ placeWord(w); });
  // Fill remaining with random letters
  var alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(var r2=0;r2<SIZE;r2++) for(var c3=0;c3<SIZE;c3++) if(grid[r2][c3]==='.') grid[r2][c3]=alpha[Math.floor(Math.random()*26)];

  var selectedCells=[], foundWords=[], firstSel=null;

  function renderGrid(){
    var html='<div style="overflow-x:auto;margin-bottom:12px"><table class="ws-grid-table">';
    for(var r3=0;r3<SIZE;r3++){
      html+='<tr>';
      for(var c4=0;c4<SIZE;c4++){
        var isFound=foundWords.some(function(fw){return fw.cells.some(function(fc){return fc[0]===r3&&fc[1]===c4;});});
        html+='<td data-r="'+r3+'" data-c="'+c4+'"'+(isFound?' class="wfound"':'')+'>'+grid[r3][c4]+'</td>';
      }
      html+='</tr>';
    }
    html+='</table></div>';
    html+='<div style="margin-bottom:10px">'+WORDS.map(function(w){
      return '<span class="word-list-item'+(foundWords.find(function(f){return f.word===w;})?' found':'')+'" id="wli'+w+'">'+w+'</span>';
    }).join('')+'</div>';
    html+='<div id="wsFb" style="font-family:Fredoka One,cursive;font-size:16px;text-align:center;min-height:22px"></div>';
    html+='<div style="font-family:Fredoka One,cursive;font-size:13px;color:var(--mid);text-align:center;margin-top:6px">'+foundWords.length+' / '+WORDS.length+' found</div>';
    b.innerHTML=html;

    b.querySelectorAll('.ws-grid-table td').forEach(function(td){
      if(td.classList.contains('wfound')) return;
      td.addEventListener('click',function(){
        var r4=parseInt(td.getAttribute('data-r')), c5=parseInt(td.getAttribute('data-c'));
        if(!firstSel){ firstSel={r:r4,c:c5}; td.classList.add('wsel'); }
        else {
          // Check if selection forms a word
          var r1=firstSel.r, c1=firstSel.c;
          var dr=Math.sign(r4-r1), dc=Math.sign(c4-c1);
          var len=Math.max(Math.abs(r4-r1),Math.abs(c4-c1))+1;
          var selWord='';
          var selCells=[];
          for(var i=0;i<len;i++){
            var nr=r1+dr*i, nc=c1+dc*i;
            if(nr<0||nr>=SIZE||nc<0||nc>=SIZE){selWord='';break;}
            selWord+=grid[nr][nc]; selCells.push([nr,nc]);
          }
          var match=placed.find(function(p){return p.word===selWord&&!foundWords.find(function(f){return f.word===p.word;});});
          if(match){
            foundWords.push(match); addStar(8);
            sq([u('Found! '+match.word,false,R,P)]);
            if(foundWords.length===WORDS.length){
              setTimeout(function(){
                b.innerHTML='<div class="game-result"><div style="font-size:70px">🔍</div>'
                  +'<div style="font-family:Fredoka One,cursive;font-size:22px;margin:10px 0">Sab Words Mili!</div>'
                  +'<button class="game-btn" style="margin-top:14px" onclick="wsWordSearch()">🔄 Phir Khelo</button>'
                  +'<button class="game-btn" style="margin-top:8px;background:linear-gradient(135deg,#A55EEA,#6C5CE7)" onclick="openWorksheetMenu()">📝 Menu</button>'
                  +'</div>';
                showConfetti(); addStar(30);
              },400);
              return;
            }
          }
          b.querySelectorAll('.wsel').forEach(function(x){x.classList.remove('wsel');});
          firstSel=null;
          renderGrid();
          return;
        }
      });
    });
  }
  renderGrid();
}

      } else {
        btn.style.background='linear-gradient(135deg,#FFF0F1,#FFD6D9)'; btn.style.borderColor='#FF4757';
        row.querySelectorAll('.match-item').forEach(function(x){if(x.getAttribute('data-ans')===correct){x.style.background='linear-gradient(135deg,#F0FFF7,#C8FFE4)';x.style.borderColor='#2ED573';}});
        fb.innerHTML='❌ Sahi tha: '+correct; fb.style.color='#FF4757';
      }
      // Check if all done
      var done=b.querySelectorAll('[data-qi]').length/4; // 4 opts per q
      var answered=b.querySelectorAll('.match-item[style*="pointer-events: none"]').length/4;
      if(answered>=qs.length){
        var fin=document.getElementById('ccFinal');
        var pct=Math.round(score/qs.length*100);
        fin.innerHTML=(pct>=70?'🎉':'💪')+' '+score+'/'+qs.length+' Sahi! '+(pct>=70?'Brilliant!':'Keep going!');
        fin.style.color=pct>=70?'#2ED573':'#FF4757';
        if(pct>=70) showConfetti();
      }
    });
  });
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el=document.getElementById(id);
  if(el) el.classList.add('active');
}
function setNav(id){
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  var el=document.getElementById(id);
  if(el) el.classList.add('active');
}
function goHome(){currentCat=null;document.getElementById('topTitle').innerHTML='🌟 KidLearn';showScreen('homeScreen');setNav('navHome');}

function addStar(n){
  stars+=n;
  document.getElementById('starCount').textContent=stars;
  var b=document.getElementById('scoreBox');
  b.classList.remove('pop');void b.offsetWidth;b.classList.add('pop');
  if(n>=10) showConfetti();
}

var CONFETTI=['🌟','⭐','✨','🎉','🎊','💫','🏆','🎈','🥳','❤️'];
function showConfetti(){
  for(var i=0;i<10;i++){
    (function(i){
      setTimeout(function(){
        var el=document.createElement('div');
        el.className='confetti-piece';
        el.textContent=CONFETTI[Math.floor(Math.random()*CONFETTI.length)];
        el.style.left=Math.random()*90+'vw';
        el.style.top='10vh';
        el.style.fontSize=(18+Math.random()*18)+'px';
        el.style.animationDuration=(0.7+Math.random()*0.6)+'s';
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},1200);
      },i*80);
    })(i);
  }
}
function shuf(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
